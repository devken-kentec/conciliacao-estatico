    <nav>
      <ol class="breadcrumb">
        <li class="breadcrumb-item"><a routerLink="/">Início</a></li>
        <li class="breadcrumb-item active">Filtro</li>
      </ol>
    </nav>
    <form class="needs-validation" novalidate [formGroup]="filtroForm">
      <div class="card" style="box-shadow: 5px 5px 10px #000;">
        <div class="card-header">
          Filtro para Conciliação Contábil e do Extrato Bancario
        </div>
        <div class="card-body">
          <div class="form-row col-md-12">

            <div class="form-group col-md-3">
              <label for="banco">Banco:</label>
              <select class="form-control" id="banco" formControlName="banco" (change)="selectAgenciaConta()">
                <option value=""></option>
                @for(banco of bancos; track banco.id) {
                  <option [ngValue]="banco.id" >{{banco.descricao}}</option>
                }
              </select>
            </div>
            <div class="form-group col-md-3">
              <label for="agenciaConta">Agência/Conta:</label>
              <select class="form-control" id="agenciaConta" formControlName="agenciaConta">
                <option value=""></option>
                @for(agencia of agencias; track agencia.id) {
                  <option [ngValue]="agencia.id" >{{agencia.agencia}} - {{agencia.conta}}</option>
                }
              </select>
            </div>
            <div class="form-group col-md-2">
              <label for="dataInicial">Data Inicial:</label>
              <input
                type="date"
                class="form-control"
                id="dataInicial"
                formControlName="dataInicial"
              />
            </div>
            <div class="form-group col-md-2">
              <label for="dataFinal">Data Final:</label>
              <input
                type="date"
                class="form-control"
                id="dataFinal"
                formControlName="dataFinal"
              />
            </div>
            <div class="form-group col-md-2">
              <label for="tipo">Tipo:</label>
              <select id="dataFinal" class="form-control" formControlName="tipo" >
                <option value="" selected></option>
                <option value="extrato">Extrato</option>
                <option value="contábil">Contábil</option>
              </select>
            </div>
          </div>
              <div class="col-12 col-md-12">
                  <button type="submit" class="btn btn-success float-right mt-2" (click)="onSubmit()">
                    <i class="fa-solid fa-check"></i> &nbsp;Abrir
                  </button>
              </div>
        </div>
      </div>
      <div>
    </div>
    </form>
